# DeepSeek-V4-Pro
# 1.6T-param MoE with 49B active, MLA, hybrid sparse + sliding-window attention,
# mixed FP4/FP8 weights. Param split: ~28.2B FP4 expert / ~20.8B FP8 non-expert
# active, ~1.547T FP4 / ~53B FP8 resident. Deployed on 8x B200 (TP=8).

[hardware]
name = "B200"
flops_fp4 = 20.0e15           # FP4 dense Tensor Core peak
flops_fp8 = 10.0e15           # FP8 dense Tensor Core peak (half of FP4)
flops_bf16 = 5.0e15
memory_bandwidth = 8.0e12     # 8 TB/s per B200
memory_capacity = 206158430208 # 192 GB per B200

[parallel]
tp = 8
ep = 1

[model]
type = "deepseek_v4"
name = "DeepSeek-V4-Pro"
num_layers = 61
hidden_dim = 7168
num_heads = 128
max_seq_len = 1048576                    # 1M context
kv_latent_dim = 512                      # MLA latent (= upstream head_dim)
qk_rope_head_dim = 64                    # un-compressed RoPE'd K dimension
kv_precision = "fp8"                     # KV cache precision
# Active-param split per token (from HF config arithmetic):
#   experts: 7 active × 3 GEMMs × hidden × moe_intermediate × 61 ≈ 28.2B at FP4
#   non-experts: attention QKVO + indexer + MTP + LM head ≈ 20.8B at FP8
num_active_expert_params = 28200000000
num_active_non_expert_params = 20800000000
# Resident: 385 experts × per-expert × 61 layers + non-expert.
num_resident_expert_params = 1547000000000
num_resident_non_expert_params = 53000000000
expert_precision = "fp4"
non_expert_precision = "fp8"
window_size = 128                        # sliding window in every layer
# Per-layer-class counts (from upstream compress_ratios array). The single
# compress_ratio=0 entry sits on the MTP head, not in the 61-layer backbone.
num_dense_layers = 0
num_near_layers = 30                     # compress_ratio = 4 with Indexer
num_far_layers = 31                      # compress_ratio = 128 (no Indexer)
near_compress_ratio = 4
far_compress_ratio = 128
index_topk = 1024                        # Indexer top-k cap on compressed history
index_n_heads = 64                       # Indexer scoring heads
index_head_dim = 128                     # Indexer scoring head dim
num_experts_per_tok = 6                  # MoE: experts activated per token
num_moe_layers = 61                      # all 61 layers run MoE

[scheduler]
max_num_batched_tokens = 16384
max_num_seqs = 256
policy = "fcfs"
enable_chunked_prefill = true
block_size = 64

[workload]
arrival_pattern = "poisson"
arrival_rate = 2.0
num_requests = 200
seed = 42

[workload.input_len_dist]
type = "lognormal"
mean = 8.0
std_dev = 1.0

[workload.output_len_dist]
type = "lognormal"
mean = 6.5
std_dev = 0.9
