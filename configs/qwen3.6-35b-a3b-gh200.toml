# Qwen3.6-35B-A3B — hybrid MoE (GatedDeltaNet linear + GQA full attention).
# Architecture from HF Qwen/Qwen3.6-35B-A3B config.json:
#   40 layers, pattern 3 linear + 1 full-attn (full_attention_interval=4) -> 10 full
#   attention + 30 GatedDeltaNet linear. Every layer is MoE (256 experts, 8 routed + 1
#   shared, moe_intermediate 512). hidden 2048. Full attn: 16 q / 2 kv heads, head_dim 256.
#   Linear: 16 key / 32 value heads, key/value head_dim 128, conv kernel 4.
# Modeled by the `qwen3.6` variant: only the 10 full-attn layers carry a growing KV cache;
# the 30 linear layers add a fixed per-sequence recurrent-state term (no KV growth); MoE
# uses coupon-collector expert loading (knee at E/k = 32).
#
# Param split (computed; ~2.86B active / ~34.6B resident, vs advertised 3B/35B):
#   per-expert (gate+up+down, moe_inter 512, hidden 2048) = 3*2048*512 = 3,145,728
#   active expert  = (8 routed + 1 shared) * 3,145,728 * 40        = 1,132,462,080
#   resident expert= (256 + 1 shared)      * 3,145,728 * 40        = 32,338,083,840
#   active non-exp = router(40*2048*256) + attn(10*18,874,368)
#                    + linear(30*~33.58M) + lm_head(2048*248320)   = 1,725,693,952
#   resident non-exp = active non-exp + input embedding(2048*248320) = 2,234,253,312

[hardware]
name = "GH200-120"
flops_fp4 = 1.979e15
flops_fp8 = 1.979e15
flops_bf16 = 0.989e15
flops_fp16 = 0.989e15
memory_bandwidth = 4.0e12
memory_capacity = 102642221056   # 192 GB
kv_cache_capacity = 0            # auto: mem * util - weights
gpu_memory_utilization = 0.9

[parallel]
tp = 1
ep = 1

[model]
type = "qwen35"
name = "Qwen3.6-35B-A3B"
num_layers = 40
hidden_dim = 2048
max_seq_len = 262144

# Full-attention (GQA) layers — the only ones with a growing KV cache.
num_attention_layers = 10
num_attention_heads = 16
num_kv_heads = 2
attn_head_dim = 256

# GatedDeltaNet linear-attention layers — constant-size recurrent state.
linear_num_value_heads = 32
linear_num_key_heads = 16
linear_key_head_dim = 128
linear_value_head_dim = 128
linear_conv_kernel = 4

# Active / resident params (expert vs non-expert split).
num_active_expert_params = 1132462080
num_active_non_expert_params = 1725693952
num_resident_expert_params = 32338083840
num_resident_non_expert_params = 2234253312

# MoE.
num_experts_per_tok = 8
num_routed_experts = 256
num_moe_layers = 40

# Native bf16 (override to fp8 to model a quantized deployment).
expert_precision = "bf16"
non_expert_precision = "bf16"
kv_precision = "bf16"

[scheduler]
max_num_batched_tokens = 16384
max_num_seqs = 4096
policy = "fcfs"
enable_chunked_prefill = true
block_size = 64

[workload]
arrival_pattern = "closed_loop"
num_concurrent_users = 256
closed_loop_jitter_secs = 0.05
num_requests = 2000
seed = 7

[workload.input_len_dist]
type = "lognormal"
mean = 7.0
std_dev = 0.5

[workload.output_len_dist]
type = "lognormal"
mean = 6.5
std_dev = 0.8

[speculative]
gamma = 8
policy = "gated_aggregate"       # engine-realizable: one batch-uniform width
# 0.0: the measured step-cost table below embodies the full engine step,
# native MTP drafter included — a (1 + draft_cost_frac * g) multiplier would
# double-count it on table-priced steps.
draft_cost_frac = 0.0

# Real native-MTP ShareGPT per-round (commits, a0..a7) traces measured on the
# target engine (sglang/GH200, depth-8 MTP rounds, ~106k rounds, 2026-06).
# Supersedes the earlier per_position fit from 12k vLLM/SPEED-Bench rounds
# (unconditional commits [.835 .650 .525 .441 .363 .297 .251 .214],
# E[accepted] = 3.58) — same model family, but this bank is the same engine
# and workload the cost table below was measured on.
[speculative.acceptance]
kind = "trace_rounds"
path = "data/qwen36_gate_gh200_rounds.csv"

# Measured (batch_size, num_draft_tokens, step_seconds) grid benchmarked on
# the target engine (same job family as the trace bank). num_draft_tokens is
# the per-sequence verify width (ndt = 1 is plain decode, ndt = g + 1 a
# g-token draft); measured widths are ndt {1,2,3,4,5,7,9}, i.e. draft depths
# {0,1,2,3,4,6,8} — depths 5 and 7 have no rows and are excluded from fixed
# columns and policy candidate sets alike. Batch coverage is partial (dense
# to B=16, sparse to B~53); lookups beyond a column's measured batch range
# clamp nearest-neighbor and the sweep example flags the affected cells.
[speculative.measured_cost]
path = "data/qwen36_gate_gh200_costs.csv"
# Mean KV context per sequence in the calibration legs the table was fitted
# from. The legs are MIXED: systematic random-ISL~1024 grids at B <= 128
# (context ~1024 prompt + ~OSL/2 of decode progress ~ 1100) plus ShareGPT
# trace legs (realized context ~400). The dense power-of-two cells the sweep
# reads come from the random-1024 legs, so we anchor there: 1100. The
# recontextualisation is small for this model anyway — only 10 of 40 layers
# carry growing KV (2 KV heads x 256 head_dim), ~20 KB/token/seq, well under
# 1 ms even at B=128 — so the random-vs-ShareGPT mixture error is third-order.
ref_seq_len = 1100
