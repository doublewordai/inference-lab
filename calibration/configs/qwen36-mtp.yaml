# Qwen3.6-35B-A3B using its own shipped MTP weights (NEXTN path, no draft repo).
# Depth 16 to match the 16-token calibration traces.
target_model: Qwen/Qwen3.6-35B-A3B
speculator:
  algorithm: mtp
  num_steps: 16
  eagle_topk: 1
  num_draft_tokens: 17
dataset: smoke
n_prompts: 4
temperature: 0.6
gpu: H200
out_dir: ../data/qwen36_mtp
mem_fraction_static: 0.92
